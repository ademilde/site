<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ademilde - Página Inicial</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f1f1f, #3c3c3c);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      letter-spacing: 2px;
      color: #f5f5f5;
    }
    .options {
      display: flex;
      gap: 2rem;
      justify-content: center;
    }
    .option {
      text-decoration: none;
      padding: 1.5rem 3rem;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      transition: all 0.3s ease;
      background: #ffffff10;
      color: #fff;
      border: 2px solid #ffffff30;
    }
    .option:hover {
      background: #ffffff30;
      border-color: #fff;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bem-vindo ao ademilde.com.br</h1>
    <div class="options">
      <a href="profissional/" class="option" href="https://ademilde.github.io/profissional/">Profissional</a>
      <a href="pessoal/" class="option" href="https://ademilde.github.io/pessoal/">Pessoal</a>
    </div>
  </div>
</body>
</html>
